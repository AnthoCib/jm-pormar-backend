services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: jm-pormar-backend
    restart: unless-stopped
    environment:
      SPRING_PROFILES_ACTIVE: neon
      SERVER_PORT: 8080

      DB_URL: ${DB_URL:?DB_URL es obligatorio}
      DB_USERNAME: ${DB_USERNAME:?DB_USERNAME es obligatorio}
      DB_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD es obligatorio}

      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET es obligatorio}
      JWT_EXPIRATION_MS: ${JWT_EXPIRATION_MS:-86400000}

      ADMIN_USERNAME: ${ADMIN_USERNAME:-admin}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@jmpormar.com}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:?ADMIN_PASSWORD es obligatorio}

      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost}

      CERTIFICATIONS_MAX_RECORDS: ${CERTIFICATIONS_MAX_RECORDS:-5}

      CLOUDINARY_CLOUD_NAME: ${CLOUDINARY_CLOUD_NAME:?CLOUDINARY_CLOUD_NAME es obligatorio}
      CLOUDINARY_API_KEY: ${CLOUDINARY_API_KEY:?CLOUDINARY_API_KEY es obligatorio}
      CLOUDINARY_API_SECRET: ${CLOUDINARY_API_SECRET:?CLOUDINARY_API_SECRET es obligatorio}
      CLOUDINARY_ROOT_FOLDER: ${CLOUDINARY_ROOT_FOLDER:-jm-pormar}

      RUC_API_BASE_URL: ${RUC_API_BASE_URL:-https://api.json.pe/api}
      RUC_API_TOKEN: ${RUC_API_TOKEN:?RUC_API_TOKEN es obligatorio}

      TZ: America/Lima
    expose:
      - "8080"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: jm-pormar-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend