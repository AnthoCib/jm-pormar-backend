services:
  postgres:
    image: postgres:16-alpine
    container_name: jm-pormar-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-jm_pormar_db}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      TZ: America/Lima
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - jm_pormar_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-jm_pormar_db}"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    build: .
    container_name: jm-pormar-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SERVER_PORT: 8080
      DB_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-jm_pormar_db}?currentSchema=public
      DB_USERNAME: ${POSTGRES_USER:-postgres}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET es obligatorio}
      JWT_EXPIRATION_MS: ${JWT_EXPIRATION_MS:-86400000}
      ADMIN_USERNAME: ${ADMIN_USERNAME:-admin}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@jmpormar.com}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:?ADMIN_PASSWORD es obligatorio}
      UPLOAD_DIR: /app/uploads
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:4200,http://localhost}
      CERTIFICATIONS_MAX_RECORDS: ${CERTIFICATIONS_MAX_RECORDS:-5}
      TZ: America/Lima
    ports:
      - "${BACKEND_PORT:-8080}:8080"
    volumes:
      - jm_pormar_uploads:/app/uploads

volumes:
  jm_pormar_postgres_data:
  jm_pormar_uploads:
