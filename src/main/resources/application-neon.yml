spring:
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
  hikari:
   maximum-pool-size: 3
   minimum-idle: 1
   connection-timeout: 10000
   validation-timeout: 5000
   idle-timeout: 600000
   max-lifetime: 1800000
   keepalive-time: 300000
  jpa:
    show-sql: false

logging:
  level:
    com.jmpormar: INFO