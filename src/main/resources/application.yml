spring:
  application:
    name: jm-pormar-backend
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:local}
  jackson:
    time-zone: America/Lima
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 12MB
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        default_schema: public
        format_sql: true
        jdbc:
          time_zone: America/Lima
  flyway:
    enabled: true
    locations: classpath:db/migration
    default-schema: public
    schemas: public
    create-schemas: true

server:
  port: ${SERVER_PORT:8080}
  error:
    include-message: never
    include-stacktrace: never

app:
  jwt:
    secret: ${JWT_SECRET:change-this-development-secret-with-at-least-32-characters}
    expiration-ms: ${JWT_EXPIRATION_MS:86400000}
  admin:
    username: ${ADMIN_USERNAME:admin}
    email: ${ADMIN_EMAIL:admin@jmpormar.com}
    password: ${ADMIN_PASSWORD:Admin2026}
  upload:
    dir: ${UPLOAD_DIR:uploads}
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:4200,http://localhost}
  certifications:
    max-records: ${CERTIFICATIONS_MAX_RECORDS:5}
  consulta-ruc:
   base-url: ${RUC_API_BASE_URL:https://apiperu.dev/api}
   token: ${RUC_API_TOKEN}

springdoc:
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method
  api-docs:
    path: /v3/api-docs

management:
  endpoints:
    web:
      exposure:
        include: health,info
